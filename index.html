<!DOCTYPE html>
<html>
<head>
    <title>Project Management Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery (REQUIRED) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- JsonPowerDB -->
    <script src="https://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
</head>

<body class="container mt-5">

<h2>Project Management Form</h2>

<form>

<div class="mb-3">
<label>Project ID</label>
<input type="text" id="projectId" class="form-control">
</div>

<div class="mb-3">
<label>Project Name</label>
<input type="text" id="projectName" class="form-control">
</div>

<div class="mb-3">
<label>Assigned To</label>
<input type="text" id="assignedTo" class="form-control">
</div>

<div class="mb-3">
<label>Assignment Date</label>
<input type="date" id="assignDate" class="form-control">
</div>

<div class="mb-3">
<label>Deadline</label>
<input type="date" id="deadline" class="form-control">
</div>

<button type="button" class="btn btn-success" onclick="saveData()">Save</button>
<button type="button" class="btn btn-warning" onclick="updateData()">Update</button>
<button type="reset" class="btn btn-secondary">Reset</button>

</form>

<script>

var connToken = "90935273|-31949235972443467|90958591";
var dbName = "COLLEGE-DB";
var relName = "PROJECT-TABLE";

function saveData(){

    var jsonStr = {
        projectId: document.getElementById("projectId").value,
        projectName: document.getElementById("projectName").value,
        assignedTo: document.getElementById("assignedTo").value,
        assignDate: document.getElementById("assignDate").value,
        deadline: document.getElementById("deadline").value
    };

    var req = createPUTRequest(
        connToken,
        JSON.stringify(jsonStr),
        dbName,
        relName
    );

    jQuery.ajaxSetup({async:false});

    var result = executeCommandAtGivenBaseUrl(
        req,
        "http://api.login2explore.com:5577",
        "/api/iml"
    );

    alert("Data Saved Successfully");

}

function updateData(){

    var jsonStr = {
        projectId: document.getElementById("projectId").value,
        projectName: document.getElementById("projectName").value,
        assignedTo: document.getElementById("assignedTo").value,
        assignDate: document.getElementById("assignDate").value,
        deadline: document.getElementById("deadline").value
    };

    var req = createUPDATERecordRequest(
        connToken,
        JSON.stringify(jsonStr),
        dbName,
        relName,
        1
    );

    jQuery.ajaxSetup({async:false});

    var result = executeCommandAtGivenBaseUrl(
        req,
        "http://api.login2explore.com:5577",
        "/api/iml"
    );

    alert("Data Updated Successfully");

}

</script>

</body>
</html>
